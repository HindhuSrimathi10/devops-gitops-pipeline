apiVersion: apps/v1
kind: Deployment

metadata:
  name: devops-app
  namespace: devops

spec:

  replicas: 2

  strategy:

    type: RollingUpdate

    rollingUpdate:

      maxUnavailable: 1
      maxSurge: 1

  selector:
    matchLabels:
      app: devops-app

  template:

    metadata:
      labels:
        app: devops-app

    spec:

      containers:

      - name: devops-container

        image: docker.io/hindhu/devops-app:latest

        ports:
        - containerPort: 5000

        volumeMounts:

        - name: app-storage
          mountPath: /data

      volumes:

      - name: app-storage

        persistentVolumeClaim:
          claimName: app-pvc